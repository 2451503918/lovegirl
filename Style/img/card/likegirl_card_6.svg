<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景 -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#grad)" opacity="0.1"/>

  <!-- 时间线 -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- 节点1 -->
  <circle cx="100" cy="50" r="12" fill="url(#grad)"/>
  <circle cx="100" cy="50" r="6" fill="#fff"/>

  <!-- 节点2 -->
  <circle cx="100" cy="100" r="12" fill="url(#grad)"/>
  <circle cx="100" cy="100" r="6" fill="#fff"/>

  <!-- 节点3 -->
  <circle cx="100" cy="150" r="12" fill="url(#grad)"/>
  <circle cx="100" cy="150" r="6" fill="#fff"/>

  <!-- 心形 -->
  <path d="M100 85 C95 75 80 75 80 85 C80 95 100 110 100 110 C100 110 120 95 120 85 C120 75 105 75 100 85" fill="#ff6b6b" opacity="0.8"/>

  <!-- 连接线 -->
  <line x1="112" y1="50" x2="150" y2="50" stroke="url(#grad)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="112" y1="100" x2="150" y2="100" stroke="url(#grad)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="112" y1="150" x2="150" y2="150" stroke="url(#grad)" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- 文字标签 -->
  <rect x="150" y="40" width="30" height="20" rx="5" fill="url(#grad)" opacity="0.2"/>
  <text x="165" y="54" font-size="10" fill="#667eea" text-anchor="middle" font-weight="bold">开始</text>

  <rect x="150" y="90" width="30" height="20" rx="5" fill="url(#grad)" opacity="0.2"/>
  <text x="165" y="104" font-size="10" fill="#667eea" text-anchor="middle" font-weight="bold">现在</text>

  <rect x="150" y="140" width="30" height="20" rx="5" fill="url(#grad)" opacity="0.2"/>
  <text x="165" y="154" font-size="10" fill="#667eea" text-anchor="middle" font-weight="bold">未来</text>
</svg>
